services:
  backend:
    build:
      context: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/app.db
      AUTH_SECRET: ${AUTH_SECRET:-vamos-local-development-secret}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-operator}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-vamos123}
      OPERATOR_FULL_NAME: ${OPERATOR_FULL_NAME:-Оператор Vamos}
    volumes:
      - backend-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./client
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  backend-data:
